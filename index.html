<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>RanchiHomeBites</title>
<link rel="stylesheet" href="style.css">
</head>
<body>

<header>
  <img src="logo.png" alt="RanchiHomeBites">
  <nav>
    <a href="index.html">Home</a>
    <a href="menu.html">Menu</a>
    <a href="blog.html">Blog</a>
  </nav>
</header>

<section class="hero">

  <div class="hero-slide active" style="background-image:url('assets/hero1.jpg')"></div>
  <div class="hero-slide" style="background-image:url('assets/hero2.jpg')"></div>
  <div class="hero-slide" style="background-image:url('assets/hero3.jpg')"></div>

  <div class="hero-overlay">
    <h1>Homemade Food in Ranchi</h1>
    <p>Fresh • Hygienic • Delicious</p>
  </div>

</section>

<h2 class="title">🔥 Today’s Special</h2>

<div class="grid">

<div class="food-card">
<img src="images/mutton-biryani.png">
<div class="food-info">
<h3>Mutton Biryani</h3>
<p>₹220</p>
<button onclick="addToCart('Mutton Biryani',220)">Add to Cart</button>
</div>
</div>

<div class="food-card">
<img src="images/non-veg-meal.png">
<div class="food-info">
<h3>Non Veg Meal</h3>
<p>₹180</p>
<button onclick="addToCart('Non Veg Meal',180)">Add to Cart</button>
</div>
</div>

</div>

<div class="cart-icon" onclick="openCart()">
🛒 <span id="cartCount">0</span>
</div>

<div id="cartModal" class="cart-modal">
  <div class="cart-box">
    <h3>Your Cart</h3>
    <div id="cartItems"></div>
    <p>Total: ₹<span id="cartTotal">0</span></p>
    <button onclick="sendWhatsAppOrder()">Order on WhatsApp</button>
    <button onclick="closeCart()">Close</button>
  </div>
</div>

<a href="https://wa.me/917633801161" class="whatsapp-float" target="_blank">
💬
</a>

<script src="script.js"></script>

</body>
</html>
